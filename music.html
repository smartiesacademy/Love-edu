<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroomify</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--green:#1db954;--green2:#1ed760;--base:#121212;--elevated:#242424;--sub:#a7a7a7;--neg:#e91429}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;outline:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
body{background:#000;color:#fff;height:100vh;width:100vw;overflow:hidden;display:grid;grid-template-rows:1fr 90px}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:4px}::-webkit-scrollbar-track{background:transparent}

/* INTRO */
#intro{position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .8s ease-out}
#intro.out{opacity:0;pointer-events:none}
.iw{display:flex;align-items:center;gap:16px}
#ilogo{width:110px;height:110px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#1db954;animation:popIn .7s cubic-bezier(.175,.885,.32,1.275) both}
#ilogo img{width:100%;height:100%;object-fit:cover}
.itclip{overflow:hidden}
#itxt{font-size:74px;font-weight:900;letter-spacing:-3px;white-space:nowrap;animation:slideIn .9s .55s cubic-bezier(.23,1,.32,1) both}
@keyframes popIn{from{transform:scale(0) rotate(-30deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#2e77d0;color:#fff;padding:12px 24px;border-radius:4px;font-weight:700;opacity:0;pointer-events:none;transition:.3s cubic-bezier(.175,.885,.32,1.275);z-index:3000;box-shadow:0 4px 12px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:4000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:#282828;width:400px;padding:24px;border-radius:8px;box-shadow:0 20px 40px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:16px}
.modal h2{font-size:24px;font-weight:700}
.modal input{background:#3e3e3e;border:1px solid transparent;color:#fff;padding:12px;border-radius:4px;font-size:14px;width:100%}
.modal input:focus{border-color:#555;background:#333}
.mbtns{display:flex;justify-content:flex-end;gap:12px;margin-top:12px}
.btn-c{background:transparent;color:#fff;border:none;font-weight:700;cursor:pointer;padding:12px 24px}
.btn-ok{background:#fff;color:#000;border:none;font-weight:700;cursor:pointer;padding:12px 24px;border-radius:20px}
.btn-ok:hover{transform:scale(1.05)}

/* LAYOUT */
.app{display:flex;height:100%;padding:8px 8px 0;gap:8px;overflow:hidden}
.sb{width:280px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
@media(max-width:768px){.sb{display:none}}
.np,.lp{background:var(--base);border-radius:8px}
.np{padding:8px 12px}
.ni{display:flex;align-items:center;gap:20px;padding:10px 16px;color:var(--sub);font-weight:700;font-size:16px;cursor:pointer;transition:.2s;border-radius:4px}
.ni:hover,.ni.active{color:#fff}
.lp{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.lhdr{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;color:var(--sub);box-shadow:0 4px 10px rgba(0,0,0,.2);z-index:2}
.ladd{cursor:pointer;transition:.2s;padding:8px;border-radius:50%}
.ladd:hover{background:#2a2a2a;color:#fff}
.pll{flex:1;overflow-y:auto;padding:0 8px;margin-top:10px}
.plr{display:flex;align-items:center;gap:12px;padding:8px;border-radius:6px;cursor:pointer;position:relative}
.plr:hover{background:#1a1a1a}
.pli{width:48px;height:48px;background:#333;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#7f7f7f;flex-shrink:0}
.plin{display:flex;flex-direction:column;gap:2px;overflow:hidden;width:100%}
.plname{color:#fff;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plsub{color:var(--sub);font-size:13px}
.pldel{position:absolute;right:10px;color:var(--sub);display:none;transition:.2s}
.plr:hover .pldel{display:block}
.pldel:hover{color:var(--neg)}

/* MAIN */
.main{background:var(--base);flex:1;border-radius:8px;position:relative;overflow-y:auto;overflow-x:hidden}
.topbar{position:sticky;top:0;height:64px;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(18,18,18,0);transition:background .3s}
.topbar.scrolled{background:#070707}
.cbtn{width:32px;height:32px;background:rgba(0,0,0,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;border:none;cursor:pointer;margin-right:8px}
#search-input{display:none;margin-left:12px;border-radius:50px;border:none;padding:0 16px;width:300px;height:32px;font-size:14px;background:#fff;color:#000}

/* CONTENT */
.ct{padding:20px 24px 100px}
.stitle{font-size:24px;font-weight:700;margin:32px 0 16px;color:#fff;cursor:pointer}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:24px}
@media(max-width:768px){.cg{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px}}
.card{background:#181818;padding:16px;border-radius:8px;transition:background .3s;cursor:pointer}
.card:hover{background:#282828}
.ca{width:100%;aspect-ratio:1;background:#333 center/cover;border-radius:4px;margin-bottom:16px;position:relative;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.cpb{position:absolute;bottom:8px;right:8px;width:48px;height:48px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#000;box-shadow:0 8px 8px rgba(0,0,0,.3);opacity:0;transform:translateY(8px);transition:.3s ease}
.card:hover .cpb{opacity:1;transform:translateY(0)}
.ctitle{font-weight:700;font-size:16px;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
.cdesc{color:var(--sub);font-size:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* BANNER */
.banner{display:flex;align-items:flex-end;gap:24px;padding:60px 24px 24px;min-height:340px;background:linear-gradient(transparent,rgba(0,0,0,.5))}
.ba{width:232px;height:232px;background:#333;box-shadow:0 4px 60px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:60px;color:#7f7f7f;background-size:cover;flex-shrink:0}
.bi h1{font-size:clamp(32px,6vw,80px);font-weight:900;margin:8px 0;letter-spacing:-2px;line-height:1}

/* TABLE */
.stbl{width:100%;border-collapse:collapse;font-size:14px;color:var(--sub)}
.stbl th{text-align:left;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.1);font-weight:400;font-size:12px}
.stbl tbody tr{height:56px;transition:.2s;cursor:pointer}
.stbl tbody tr:hover{background:rgba(255,255,255,.1)}
.stbl td{padding:0 12px}
.rn{display:block}.rp{display:none;color:#fff}
.stbl tbody tr:hover .rn{display:none}
.stbl tbody tr:hover .rp{display:block}

/* PLAYER */
.player{background:#181818;border-top:1px solid #282828;padding:0 16px;display:flex;justify-content:space-between;align-items:center;z-index:500}
.pbl{width:30%;display:flex;align-items:center;gap:14px}
.pbart{width:56px;height:56px;border-radius:4px;background:#333 center/cover;flex-shrink:0}
.pbm{display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.pbt{color:#fff;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pba{color:var(--sub);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#pbh{margin-left:12px;color:#b3b3b3;cursor:pointer;flex-shrink:0;font-size:16px;transition:.2s}
#pbh.liked{color:var(--green)}
.pbc{width:40%;display:flex;flex-direction:column;align-items:center;gap:6px}
.pbbtns{display:flex;align-items:center;gap:20px;margin-bottom:2px}
.ctrl{color:#b3b3b3;background:none;border:none;font-size:16px;cursor:pointer;transition:.2s}
.ctrl:hover{color:#fff}
.ctrl.active{color:var(--green)}
.playbtn{width:32px;height:32px;background:#fff;border-radius:50%;color:#000;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s;cursor:pointer}
.playbtn:hover{transform:scale(1.06)}
.progr{width:100%;display:flex;align-items:center;gap:8px;font-size:11px;color:#b3b3b3}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#4d4d4d;border-radius:2px;cursor:pointer;background-image:linear-gradient(var(--green),var(--green));background-size:0% 100%;background-repeat:no-repeat}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:12px;width:12px;border-radius:50%;background:#fff;opacity:0;transition:.2s}
.progr:hover input[type=range]::-webkit-slider-thumb{opacity:1}
.pbr{width:30%;display:flex;justify-content:flex-end;align-items:center;gap:10px}
.vw{width:100px;display:flex;align-items:center}

/* CTX */
#ctx{position:fixed;background:#282828;border-radius:4px;padding:4px;width:220px;box-shadow:0 16px 24px rgba(0,0,0,.5);display:none;z-index:2000;border:1px solid rgba(255,255,255,.05)}
.cxi{padding:10px 12px;font-size:14px;color:#eaeaea;cursor:pointer;display:flex;justify-content:space-between;align-items:center;position:relative}
.cxi:hover{background:#3e3e3e}
.cxsub{position:absolute;left:100%;top:-5px;background:#282828;width:200px;padding:4px;display:none;box-shadow:0 16px 24px rgba(0,0,0,.5);margin-left:-2px}
.cxi:hover .cxsub{display:block}

/* MISC */
.bigplay{width:56px;height:56px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;font-size:24px;cursor:pointer;margin-bottom:24px;transition:.2s;flex-shrink:0}
.bigplay:hover{transform:scale(1.06)}
.spin{border:4px solid rgba(255,255,255,.1);border-top:4px solid var(--green);border-radius:50%;width:30px;height:30px;animation:rot 1s linear infinite;margin:40px auto}
@keyframes rot{to{transform:rotate(360deg)}}
.empty{color:var(--sub);padding:40px;text-align:center}
.verified{position:relative;display:inline-block;width:20px;height:20px;margin-left:6px}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="iw">
    <div id="ilogo">
      <img src="https://tse2.mm.bing.net/th/id/OIP.tSGADK1_j2E06s053SdZRwHaFj?pid=ImgDet&w=203&h=152&c=7&o=7&rm=3"
           alt="Logo" onerror="this.style.display='none'">
    </div>
    <div class="itclip"><div id="itxt">Classroomify</div></div>
  </div>
</div>

<div id="toast"></div>

<!-- MODAL -->
<div id="modal-bg">
  <div class="modal">
    <h2>Create Playlist</h2>
    <input id="pli" placeholder="My Playlist #1" onkeydown="if(event.key==='Enter')confirmPl()">
    <div class="mbtns">
      <button class="btn-c" onclick="closePl()">Cancel</button>
      <button class="btn-ok" onclick="confirmPl()">Create</button>
    </div>
  </div>
</div>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sb">
    <div class="np">
      <div class="ni active" data-v="home" onclick="nav('home')"><i class="fas fa-home"></i> Home</div>
      <div class="ni" data-v="search" onclick="nav('search')"><i class="fas fa-search"></i> Search</div>
    </div>
    <div class="lp">
      <div class="lhdr">
        <div class="ni" style="padding:0;gap:12px;" onclick="nav('library')"><i class="fas fa-book"></i> Your Library</div>
        <i class="fas fa-plus ladd" onclick="openPl()"></i>
      </div>
      <div class="pll" id="sbl"></div>
    </div>
  </div>

  <!-- MAIN VIEW -->
  <div class="main" id="mainscroll">
    <div class="topbar" id="topbar">
      <div style="display:flex;align-items:center">
        <button class="cbtn" onclick="history.back()"><i class="fas fa-chevron-left"></i></button>
        <button class="cbtn" onclick="history.forward()"><i class="fas fa-chevron-right"></i></button>
        <input id="search-input" placeholder="Search songs or artists…" onkeypress="if(event.key==='Enter')doSearch(this.value)">
      </div>
      <div style="background:rgba(0,0,0,.7);padding:4px 12px;border-radius:20px;font-weight:700;font-size:14px;cursor:pointer">
        <i class="fas fa-user-circle"></i> User
      </div>
    </div>
    <div id="view"></div>
  </div>
</div>

<!-- PLAYER -->
<div class="player">
  <div class="pbl">
    <div class="pbart" id="pbart"></div>
    <div class="pbm">
      <div class="pbt" id="pbt">Select a song to play</div>
      <div class="pba" id="pba">—</div>
    </div>
    <i class="far fa-heart" id="pbh" onclick="likeCurrentSong()"></i>
  </div>
  <div class="pbc">
    <div class="pbbtns">
      <button class="ctrl" id="bsh" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
      <button class="ctrl" onclick="prevSong()"><i class="fas fa-step-backward"></i></button>
      <div class="playbtn" onclick="togglePlay()"><i class="fas fa-play" id="pi"></i></div>
      <button class="ctrl" onclick="nextSong()"><i class="fas fa-step-forward"></i></button>
      <button class="ctrl" id="blp" onclick="toggleLoop()"><i class="fas fa-redo"></i></button>
    </div>
    <div class="progr">
      <span id="tc">0:00</span>
      <input type="range" id="seek" min="0" max="100" value="0">
      <span id="td">0:00</span>
    </div>
  </div>
  <div class="pbr">
    <i class="fas fa-volume-up ctrl" id="vi" onclick="toggleMute()"></i>
    <div class="vw"><input type="range" id="vol" min="0" max="1" step="0.01" value="1"></div>
  </div>
</div>

<!-- CTX MENU -->
<div id="ctx">
  <div class="cxi" onclick="ctxLike()">Add to Liked Songs</div>
  <div class="cxi">Add to Playlist <i class="fas fa-caret-right"></i>
    <div class="cxsub" id="cxpls"></div>
  </div>
</div>

<script>
// ── iTunes search API (same as Cinify) ───────────────────────────────────────
async function itunesSearch(term, limit = 25) {
  try {
    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=song&limit=${limit}&media=music`);
    const data = await res.json();
    return data.results
      .filter(i => i.previewUrl)   // only tracks that have audio
      .map(i => ({
        id:       String(i.trackId),
        title:    i.trackName,
        artist:   i.artistName,
        album:    i.collectionName || '',
        cover:    i.artworkUrl100 ? i.artworkUrl100.replace('100x100bb','600x600bb') : '',
        url:      i.previewUrl,     // direct iTunes AAC preview URL
        duration: fmtMs(i.trackTimeMillis)
      }));
  } catch(e) { console.error('iTunes search failed:', e); return []; }
}

function fmtMs(ms) {
  if (!ms) return '0:30';
  const m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000);
  return `${m}:${s<10?'0':''}${s}`;
}

// ── State ──────────────────────────────────────────────────────────────────
const audio = new Audio();
// Do NOT set crossOrigin — iTunes preview URLs don't need it and it causes CORS blocks
let Q=[], qi=0, isPlaying=false, sh=false, lp=false;
let PL  = JSON.parse(localStorage.getItem('cr_pl')  || '[]');
let LK  = JSON.parse(localStorage.getItem('cr_lk')  || '[]');
let SDB = JSON.parse(localStorage.getItem('cr_sdb') || '{}'); // song database/cache
let cxSong = null;

// ── Helpers ───────────────────────────────────────────────────────────────
const $   = id => document.getElementById(id);
const esc = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtSec = t => { if(isNaN(t))return'0:00'; const m=Math.floor(t/60),s=Math.floor(t%60); return `${m}:${s<10?'0':''}${s}`; };
const setRng = el => { el.style.backgroundSize=`${((el.value-el.min)/(el.max-el.min))*100}% 100%`; };
const toast  = m  => { const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); };
const save   = () => { localStorage.setItem('cr_pl',JSON.stringify(PL)); localStorage.setItem('cr_lk',JSON.stringify(LK)); localStorage.setItem('cr_sdb',JSON.stringify(SDB)); };
// Cache every song we encounter
const cacheS = s  => { SDB[s.id]=s; };

// ── Init ──────────────────────────────────────────────────────────────────
function init() {
  // Dismiss intro
  setTimeout(() => { $('intro').classList.add('out'); }, 2400);

  // Audio events
  audio.addEventListener('timeupdate', onTU);
  audio.addEventListener('ended',      onEnd);
  audio.addEventListener('play',       () => { isPlaying=true;  piUpdate(); });
  audio.addEventListener('pause',      () => { isPlaying=false; piUpdate(); });
  audio.addEventListener('error',      () => { toast('Track unavailable, skipping…'); setTimeout(nextSong, 1000); });

  // Seek
  $('seek').addEventListener('input',  e => { setRng(e.target); if(audio.duration) $('tc').textContent=fmtSec((e.target.value/100)*audio.duration); });
  $('seek').addEventListener('change', e => { if(audio.duration) audio.currentTime=(e.target.value/100)*audio.duration; });

  // Volume
  $('vol').addEventListener('input', e => { audio.volume=parseFloat(e.target.value); setRng(e.target); volIcon(); });
  setRng($('vol'));

  $('mainscroll').addEventListener('scroll', e => $('topbar').classList.toggle('scrolled', e.target.scrollTop>60));
  document.addEventListener('click', e => { if(!e.target.closest('#ctx')) $('ctx').style.display='none'; });
  window.addEventListener('popstate', e => { if(e.state) nav(e.state.v, e.state.p, true); });

  renderSB();
  nav('home');
}

// ── Navigation ────────────────────────────────────────────────────────────
async function nav(v, p=null, pop=false) {
  if(!pop) history.pushState({v,p},'',`#${v}${p?'/'+p:''}`);
  document.querySelectorAll('.ni').forEach(el => el.classList.toggle('active', el.dataset.v===v));
  $('search-input').style.display = v==='search' ? 'block' : 'none';
  if(v==='search') setTimeout(()=>$('search-input').focus(),50);
  const vw=$('view');
  vw.innerHTML = '<div class="spin"></div>';
  $('mainscroll').scrollTop=0;

  if(v==='home')          await renderHome(vw);
  else if(v==='search')   renderSearch(vw);
  else if(v==='library')  renderLibrary(vw);
  else if(v==='liked')    renderPL(vw,{name:'Liked Songs',desc:'Your favorites'}, Object.values(SDB).filter(s=>LK.includes(s.id)), true);
  else if(v==='playlist'){
    const pl=PL.find(x=>x.id===p);
    if(pl) renderPL(vw,{name:pl.name,desc:'Playlist'},pl.songs.map(id=>SDB[id]).filter(Boolean),false);
    else vw.innerHTML='<div class="ct empty">Playlist not found</div>';
  }
}

// ── Home: show seeds immediately, then try live API ──────────────────────
async function renderHome(vw) {
  const sections = [
    {label:"Today's Hits", seed: SEEDS.hits,   term:'top hits 2024'},
    {label:'Indie Chill',  seed: SEEDS.indie,  term:'indie pop'},
    {label:'Hip-Hop',      seed: SEEDS.hiphop, term:'hip hop'},
    {label:'Pop Favorites',seed: SEEDS.pop,    term:'pop music'},
  ];

  // Render with seed data immediately so there's always something to see
  function build(sections, resultsMap) {
    let h = `<div class="ct"><h1 style="color:#fff;margin-bottom:24px">Good ${new Date().getHours()<12?'Morning':'Evening'}</h1>`;
    sections.forEach(sec => {
      const tracks = resultsMap[sec.label] || sec.seed;
      if(!tracks.length) return;
      tracks.forEach(cacheS);
      h += `<div class="stitle">${esc(sec.label)}</div><div class="cg">${tracks.map(s=>cardHtml(s)).join('')}</div>`;
    });
    h += '</div>';
    return h;
  }

  // First paint with seeds
  const seedMap = {};
  sections.forEach(s => { seedMap[s.label]=s.seed; });
  vw.innerHTML = build(sections, seedMap);

  // Then try live API and repaint if successful
  try {
    const live = await Promise.all(sections.map(s=>itunesSearch(s.term,8)));
    const liveMap = {};
    sections.forEach((s,i)=>{ if(live[i].length) liveMap[s.label]=live[i]; });
    if(Object.keys(liveMap).length > 0) {
      vw.innerHTML = build(sections, {...seedMap,...liveMap});
    }
  } catch(e) { /* seeds already shown, no problem */ }
}

// ── Search ────────────────────────────────────────────────────────────────
function renderSearch(vw) {
  vw.innerHTML=`<div class="ct"><p style="color:var(--sub);margin-bottom:16px">Type above and press Enter to search iTunes…</p><div class="cg" id="sg"></div></div>`;
}

async function doSearch(q) {
  if(!q.trim()) return;
  const sg=$('sg'); if(!sg) return;
  sg.innerHTML='<div class="spin"></div>';
  let results = await itunesSearch(q, 50);
  // If live fails, search seeds as fallback
  if(!results.length) {
    const ql=q.toLowerCase();
    const all=[...SEEDS.hits,...SEEDS.indie,...SEEDS.hiphop,...SEEDS.pop];
    results=all.filter(s=>s.title.toLowerCase().includes(ql)||s.artist.toLowerCase().includes(ql));
  }
  results.forEach(cacheS);
  sg.innerHTML = results.length ? results.map(s=>cardHtml(s)).join('') : '<div class="empty">No results found</div>';
}

// ── Library ───────────────────────────────────────────────────────────────
function renderLibrary(vw) {
  let h=`<div class="ct"><h1 style="color:#fff;margin-bottom:24px">Your Library</h1><div class="cg">
    <div class="card" onclick="nav('liked')">
      <div class="ca" style="background:linear-gradient(135deg,#450af5,#c4efd9);display:flex;align-items:center;justify-content:center">
        <i class="fas fa-heart" style="font-size:50px;color:#fff"></i></div>
      <div class="ctitle">Liked Songs</div><div class="cdesc">${LK.length} songs</div></div>`;
  PL.forEach(pl=>{
    const fc=pl.songs[0]&&SDB[pl.songs[0]];
    h+=`<div class="card" onclick="nav('playlist','${pl.id}')">
      <div class="ca" style="background:#333 ${fc?`url('${fc.cover}') center/cover`:''};display:flex;align-items:center;justify-content:center">
        ${!fc?'<i class="fas fa-music" style="font-size:50px;color:#777"></i>':''}
        <div class="cpb" onclick="event.stopPropagation();playCtx(${JSON.stringify(pl.songs.map(id=>SDB[id]).filter(Boolean))})"><i class="fas fa-play"></i></div></div>
      <div class="ctitle">${esc(pl.name)}</div><div class="cdesc">${pl.songs.length} songs</div></div>`;
  });
  h+='</div></div>';
  vw.innerHTML=h;
}

// ── Playlist page ─────────────────────────────────────────────────────────
function renderPL(vw, meta, arr, isLiked) {
  const bg = isLiked?'linear-gradient(135deg,#450af5,#c4efd9)':'#333';
  vw.innerHTML=`
    <div class="banner" style="background:linear-gradient(transparent,#121212);background-color:#5038a0">
      <div class="ba" style="background:${bg};color:#fff">${isLiked?'<i class="fas fa-heart"></i>':'<i class="fas fa-music"></i>'}</div>
      <div class="bi">
        <div style="font-size:12px;font-weight:700;text-transform:uppercase">Playlist</div>
        <h1>${esc(meta.name)}</h1>
        <div style="color:#d9d9d9;margin-top:8px">${esc(meta.desc)} · ${arr.length} songs</div>
      </div>
    </div>
    <div class="ct">
      ${arr.length?`<div class="bigplay" onclick='playCtx(${JSON.stringify(arr)})'><i class="fas fa-play"></i></div>`:''}
      ${tblHtml(arr)}
    </div>`;
}

// ── Card HTML ─────────────────────────────────────────────────────────────
function cardHtml(s) {
  const d=encodeURIComponent(JSON.stringify(s));
  return `<div class="card" data-s="${d}" onclick="playSingle(this)" oncontextmenu="openCtx(event,this)">
    <div class="ca" style="background-image:url('${esc(s.cover)}')">
      <div class="cpb"><i class="fas fa-play"></i></div>
    </div>
    <div class="ctitle">${esc(s.title)}</div>
    <div class="cdesc">${esc(s.artist)}</div>
  </div>`;
}
function gS(el){ return JSON.parse(decodeURIComponent(el.dataset.s)); }
function playSingle(el){ const s=gS(el); cacheS(s); playCtx([s]); }
function openCtx(e,el){ e.preventDefault(); cxSong=gS(el); cacheS(cxSong); showCtx(e.pageX,e.pageY); }

// ── Table HTML ────────────────────────────────────────────────────────────
function tblHtml(arr) {
  if(!arr.length) return '<div class="empty">No songs yet</div>';
  const qd=encodeURIComponent(JSON.stringify(arr));
  return `<table class="stbl">
    <thead><tr><th style="width:40px">#</th><th>Title</th><th>Album</th><th><i class="far fa-clock"></i></th></tr></thead>
    <tbody>${arr.map((s,i)=>{
      const sd=encodeURIComponent(JSON.stringify(s)), il=LK.includes(s.id);
      return `<tr data-s="${sd}" data-i="${i}" data-q="${qd}" ondblclick="rowPlay(this)" oncontextmenu="rowCtx(event,this)">
        <td><span class="rn">${i+1}</span><span class="rp" onclick="rowPlay(this.closest('tr'))"><i class="fas fa-play"></i></span></td>
        <td><div style="display:flex;align-items:center;gap:12px">
          <img src="${esc(s.cover)}" style="width:40px;height:40px;border-radius:4px;object-fit:cover" loading="lazy">
          <div><div style="color:#fff;font-size:15px">${esc(s.title)}</div><div style="color:#b3b3b3">${esc(s.artist)}</div></div>
        </div></td>
        <td>${esc(s.album)}</td>
        <td><div style="display:flex;align-items:center;justify-content:flex-end;gap:16px">
          <i class="${il?'fas':'far'} fa-heart hb" data-id="${s.id}" style="color:${il?'#1db954':'#b3b3b3'};cursor:pointer" onclick="rowLike(event,this)"></i>
          ${s.duration}
        </div></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}
function rowPlay(tr){ playCtx(JSON.parse(decodeURIComponent(tr.dataset.q)), parseInt(tr.dataset.i)); }
function rowCtx(e,tr){ e.preventDefault(); cxSong=JSON.parse(decodeURIComponent(tr.dataset.s)); cacheS(cxSong); showCtx(e.pageX,e.pageY); }
function rowLike(e,el){ e.stopPropagation(); toggleLike(JSON.parse(decodeURIComponent(el.closest('tr').dataset.s))); }

// ── Context menu ──────────────────────────────────────────────────────────
function showCtx(x,y){
  $('cxpls').innerHTML = PL.length
    ? PL.map(p=>`<div class="cxi" onclick="ctxAddToPl('${p.id}')">${esc(p.name)}</div>`).join('')
    : '<div class="cxi" style="color:#777;cursor:default">No playlists</div>';
  const m=$('ctx'); m.style.display='block'; m.style.left=x+'px'; m.style.top=y+'px';
}
function ctxLike(){ if(cxSong) toggleLike(cxSong); $('ctx').style.display='none'; }
function ctxAddToPl(id){
  const pl=PL.find(p=>p.id===id);
  if(pl&&cxSong){
    if(!pl.songs.includes(cxSong.id)){ pl.songs.push(cxSong.id); save(); renderSB(); toast(`Added to ${pl.name}`); }
    else toast('Already in playlist');
  }
  $('ctx').style.display='none';
}

// ── Like ──────────────────────────────────────────────────────────────────
function toggleLike(s){
  const was=LK.includes(s.id);
  if(was) LK=LK.filter(id=>id!==s.id); else { LK.push(s.id); cacheS(s); }
  save(); renderSB(); refreshLike(s.id,!was);
}
function likeCurrentSong(){ if(Q[qi]) toggleLike(Q[qi]); }
function refreshLike(id,il){
  document.querySelectorAll(`.hb[data-id="${id}"]`).forEach(el=>{ el.className=`${il?'fas':'far'} fa-heart hb`; el.style.color=il?'#1db954':'#b3b3b3'; });
  if(Q[qi]?.id===id){ $('pbh').className=`${il?'fas':'far'} fa-heart`; $('pbh').classList.toggle('liked',il); }
}

// ── Playlists ─────────────────────────────────────────────────────────────
function openPl(){ $('pli').value=''; $('modal-bg').style.display='flex'; setTimeout(()=>$('pli').focus(),50); }
function closePl(){ $('modal-bg').style.display='none'; }
function confirmPl(){
  const n=$('pli').value.trim(); if(!n) return;
  PL.push({id:`pl_${Date.now()}`,name:n,songs:[]}); save(); renderSB(); closePl();
}
function renderSB(){
  $('sbl').innerHTML=`
    <div class="plr" onclick="nav('liked')">
      <div class="pli" style="background:linear-gradient(135deg,#450af5,#c4efd9);color:#fff"><i class="fas fa-heart"></i></div>
      <div class="plin"><div class="plname">Liked Songs</div><div class="plsub">${LK.length} songs</div></div>
    </div>
    ${PL.map(pl=>`
    <div class="plr" onclick="nav('playlist','${pl.id}')">
      <div class="pli"><i class="fas fa-music"></i></div>
      <div class="plin"><div class="plname">${esc(pl.name)}</div><div class="plsub">${pl.songs.length} songs</div></div>
      <i class="fas fa-times pldel" onclick="delPl('${pl.id}',event)"></i>
    </div>`).join('')}`;
}
function delPl(id,e){ e.stopPropagation(); if(!confirm('Delete this playlist?'))return; PL=PL.filter(p=>p.id!==id); save(); renderSB(); nav('home'); }

// ── Playback ──────────────────────────────────────────────────────────────
function playCtx(arr, idx=0){
  if(!arr||!arr.length) return;
  Q=[...arr]; load(idx, true);
}

function load(idx, autoPlay=true){
  if(!Q.length) return;
  qi=((idx%Q.length)+Q.length)%Q.length;
  const s=Q[qi];
  cacheS(s);

  $('pbt').textContent  = s.title;
  $('pba').textContent  = s.artist;
  $('pbart').style.backgroundImage = `url('${s.cover}')`;
  document.title        = `${s.title} — Classroomify`;

  const il=LK.includes(s.id);
  $('pbh').className=`${il?'fas':'far'} fa-heart`;
  $('pbh').classList.toggle('liked',il);

  const sk=$('seek'); sk.value=0; setRng(sk);
  $('tc').textContent='0:00';
  $('td').textContent=s.duration||'0:00';

  if(!s.url){ toast('No audio for this track'); return; }

  audio.pause();
  audio.currentTime=0;
  audio.src = s.url;   // iTunes preview URL — direct, no crossOrigin needed
  audio.load();

  if(autoPlay){
    isPlaying=true; piUpdate();
    audio.play().catch(err=>{
      console.warn('Autoplay blocked:', err);
      isPlaying=false; piUpdate();
      toast('Click ▶ to start');
    });
  }
}

function togglePlay(){ if(!audio.src){ toast('Pick a song first'); return; } if(isPlaying) audio.pause(); else audio.play().catch(console.warn); }
function piUpdate(){ $('pi').className=isPlaying?'fas fa-pause':'fas fa-play'; }
function nextSong(){ load(sh?Math.floor(Math.random()*Q.length):qi+1); }
function prevSong(){ if(audio.currentTime>3) audio.currentTime=0; else load(qi-1); }
function toggleShuffle(){ sh=!sh; $('bsh').classList.toggle('active',sh); }
function toggleLoop(){ lp=!lp; audio.loop=lp; $('blp').classList.toggle('active',lp); }
function onEnd(){ if(!lp) nextSong(); }

function onTU(){
  if(!audio.duration||isNaN(audio.duration)) return;
  const sk=$('seek'); sk.value=(audio.currentTime/audio.duration)*100; setRng(sk);
  $('tc').textContent=fmtSec(audio.currentTime);
  $('td').textContent=fmtSec(audio.duration);
}

function toggleMute(){ audio.muted=!audio.muted; volIcon(); }
function volIcon(){
  const i=$('vi');
  i.className=audio.muted||audio.volume===0?'fas fa-volume-mute ctrl':audio.volume<0.5?'fas fa-volume-down ctrl':'fas fa-volume-up ctrl';
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
